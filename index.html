<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Buffed Wiki</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Offizielles Wiki von Buffed – Buffs, Essences, Regeln und Server-Infos">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="icon" href="images/server-icon.ico" type="image/x-icon">

  <!-- Docsify Themeable Base Theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">

  <!-- Custom Theme Overrides -->
  <style>
    :root {
      --theme-color: #d4af37;
      --theme-color-secondary: #ffd700;
      --base-background-color: #1a1a1a;
      --base-color: #e0e0e0;
      --base-font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --base-font-size: 15px;
      --base-line-height: 1.7;

      --sidebar-background: #141414;
      --sidebar-border-color: #2a2a2a;
      --sidebar-name-color: #d4af37;
      --sidebar-nav-link-color: #b0b0b0;
      --sidebar-nav-link-color--active: #d4af37;
      --sidebar-nav-link-color--hover: #ffd700;
      --sidebar-nav-link-font-weight--active: 600;
      --sidebar-nav-link-border-color--active: #d4af37;

      --heading-h1-color: #d4af37;
      --heading-h2-color: #e0e0e0;
      --heading-h3-color: #c8c8c8;
      --heading-h2-border-color: #2a2a2a;
      --heading-h2-border-style: solid;
      --heading-h2-border-width: 0 0 1px 0;
      --heading-h2-padding: 0 0 0.4em 0;

      --link-color: #d4af37;
      --link-color--hover: #ffd700;

      --blockquote-background: #1f1f1f;
      --blockquote-border-color: #d4af37;
      --blockquote-border-width: 0 0 0 4px;
      --blockquote-color: #c0c0c0;

      --code-inline-background: #2a2a2a;
      --code-inline-color: #ffd700;
      --code-theme-background: #0d0d0d;

      --notice-tip-border-color: #d4af37;
      --notice-important-border-color: #e74c3c;

      --cover-background-color: #0d0d0d;
      --cover-background-image: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
      --cover-color: #e0e0e0;
      --cover-heading-color: #d4af37;
      --cover-heading-font-weight: 700;
      --cover-button-background: #d4af37;
      --cover-button-color: #0d0d0d;
      --cover-button-border: 2px solid #d4af37;
      --cover-button-border-radius: 4px;
      --cover-button-primary-background: transparent;
      --cover-button-primary-color: #d4af37;
      --cover-button-primary-border: 2px solid #d4af37;

      --search-input-background-color: #2a2a2a;
      --search-input-color: #e0e0e0;
      --search-result-heading-color: #d4af37;
      --search-result-item-color: #c0c0c0;
      --search-result-item-color--active: #ffd700;
    }

    /* Table styling */
    .markdown-section table {
      border-collapse: collapse;
      margin: 1em 0;
    }
    .markdown-section table th {
      background: #2a2a2a;
      color: #d4af37;
      border-color: #3a3a3a;
    }
    .markdown-section table td {
      border-color: #2a2a2a;
    }

    /* Sidebar group styling */
    .sidebar-nav > ul > li > p {
      color: #d4af37 !important;
      font-weight: 700;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 1.2em;
      margin-bottom: 0.3em;
    }

    /* Coverpage tweaks */
    section.cover .cover-main > p:last-child a {
      margin: 0.3em 0.3em 0.3em 0;
    }

    /* Code block tweaks */
    .markdown-section pre {
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    /* Pagination styling */
    .pagination-item-title {
      color: #d4af37 !important;
    }
    .pagination-item-label {
      color: #888 !important;
    }
  </style>
</head>
<body>
  <div id="app">Lade Wiki...</div>
  <script>
    window.$docsify = {
      name: 'Buffed Wiki',
      repo: 'https://github.com/NikeyV1/Buffed',
      logo: 'images/server-icon.png',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      onlyCover: false,
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 3,
      homepage: 'README.md',
      notFoundPage: true,
      relativePath: true,

      // Search Plugin Config
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Wiki durchsuchen...',
        noData: 'Keine Ergebnisse gefunden.',
        depth: 6,
        hideOtherSidebarContent: false
      },

      // Pagination Plugin Config
      pagination: {
        previousText: 'Zurück',
        nextText: 'Weiter',
        crossChapter: true,
        crossChapterText: true
      },

      // Copy Code Plugin Config
      copyCode: {
        buttonText: 'Kopieren',
        errorText: 'Fehler',
        successText: 'Kopiert!'
      },

      // Tabs Plugin Config
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic',
        tabComments: true,
        tabHeadings: true
      },

      // Sidebar Collapse Plugin
      sidebarDisplayLevel: 1
    }
  </script>

  <!-- Docsify Core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Themeable Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-themeable@0"></script>

  <!-- Search Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

  <!-- Pagination Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

  <!-- Copy Code Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>

  <!-- Tabs Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-tabs@1"></script>

  <!-- Sidebar Collapse Plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>

  <!-- Syntax Highlighting (YAML, Java for plugin examples) -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>

  <!-- Emoji -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>

  <!-- External Links open in new tab -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/external-script.min.js"></script>
</body>
</html>
